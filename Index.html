<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>伊利小編購 | 官方行動商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cream-bg': '#F7F5F0',
            'warm-taupe': '#8C857B',
            'taupe-dark': '#6E675F',
            'carbon-black': '#3A3530',
            'misty-rose': '#D4B2A7',
            'border-soft': '#EAE6DF',
            'sibyl-gold': '#bca085'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F7F5F0; color: #3A3530; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans antialiased pb-24">

  <!-- 右上角：LINE 客服 與 加入 LINE 社群 -->
  <div class="w-full flex justify-end gap-2 px-4 pt-4 pb-2 z-50">
    <a href="https://lin.ee/925zrjur" target="_blank" class="bg-white border border-border-soft text-[11px] font-medium px-3 py-1.5 rounded-full shadow-sm hover:bg-warm-taupe hover:text-white transition-all">LINE 客服</a>
    <a href="https://line.me/ti/g2/LOmembwBbeqIpXoFcYG6yX8pCGrIvkPbnNpIig?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="bg-white border border-border-soft text-[11px] font-medium px-3 py-1.5 rounded-full shadow-sm hover:bg-warm-taupe hover:text-white transition-all">加入 LINE 社群</a>
  </div>

  <!-- 品牌 LOGO 區：精準控制大小為 35 (140px) -->
  <div class="flex flex-col items-center text-center px-4 py-4">
    <div class="w-[140px] h-[140px] rounded-full border-2 border-border-soft shadow-md overflow-hidden bg-white mb-3">
      <img src="https://i.postimg.cc/x887dL6Q/line-oa-chat-260617-163106.jpg" class="w-full h-full object-cover" alt="Store Logo">
    </div>
    <h1 class="text-xl font-bold tracking-[3px] text-carbon-black uppercase">伊利小編購</h1>
  </div>

  <!-- 跑馬燈公告區 -->
  <div class="mx-4 my-2 bg-white border border-border-soft rounded-xl p-3.5 text-xs text-center leading-relaxed shadow-sm text-stone-600" id="announcementText">
    同步雲端動態公告連線中...
  </div>

  <!-- 搜尋與查詢 -->
  <div class="px-4 py-2 space-y-2">
    <div class="bg-white border border-border-soft rounded-xl p-1.5 flex items-center shadow-sm">
      <input type="text" id="searchInput" class="bg-transparent pl-3 pr-2 py-2 text-xs outline-none flex-1 text-carbon-black" placeholder="輸入關鍵字搜尋...">
      <button onclick="searchProducts()" class="bg-warm-taupe text-white text-xs font-medium px-4 py-2 rounded-lg hover:bg-taupe-dark transition-all">搜尋</button>
      <button onclick="toggleQueryPanel()" class="bg-misty-rose text-white text-xs font-medium px-3 py-2 rounded-lg ml-1.5 hover:opacity-90 transition-all">訂單查詢</button>
    </div>

    <div id="queryPanel" class="bg-white border border-border-soft rounded-xl p-4 shadow-md hidden">
      <h4 class="text-xs font-bold text-carbon-black mb-2">手機實時查單</h4>
      <input type="text" id="orderQueryInput" class="w-full text-xs p-2.5 border border-border-soft rounded-lg bg-stone-50 outline-none mb-2" placeholder="請輸入訂購人手機號碼">
      <button onclick="fetchOrderProgress()" class="w-full bg-warm-taupe text-white text-xs font-medium py-2.5 rounded-lg">送出查詢</button>
      <div id="queryResult" class="mt-3 space-y-2 max-h-40 overflow-y-auto"></div>
    </div>
  </div>

  <!-- 分類滑塊 -->
  <div class="overflow-x-auto no-scrollbar flex gap-2 px-4 py-2" id="categorySlider">
    <button class="bg-warm-taupe text-white text-xs px-4 py-1.5 rounded-full whitespace-nowrap shadow-sm">全部商品</button>
  </div>

  <!-- 商品網格 -->
  <div class="grid grid-cols-2 gap-3 px-4 py-3" id="productGrid">
    <div class="col-span-2 text-center py-12 text-xs text-stone-400">正在加載商品...</div>
  </div>

  <!-- 下單彈窗 Modal -->
  <div id="orderModal" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] hidden z-50 items-end sm:items-center justify-center p-0">
    <div class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 shadow-xl max-h-[90vh] overflow-y-auto space-y-4">
      <div class="flex justify-between items-start">
        <div>
          <h3 id="modalProdName" class="text-sm font-bold text-carbon-black">商品預約</h3>
          <p id="modalProdPrice" class="text-sm font-semibold text-warm-taupe mt-0.5"></p>
        </div>
        <button onclick="closeOrderModal()" class="text-stone-400 text-xl font-bold p-1">×</button>
      </div>

      <div class="space-y-3">
        <div id="colorArea" class="hidden">
          <label class="text-[11px] font-bold text-stone-500 block mb-1.5">選擇顏色</label>
          <div id="colorContainer" class="flex flex-wrap gap-2"></div>
        </div>
        <div id="sizeArea" class="hidden">
          <label class="text-[11px] font-bold text-stone-500 block mb-1.5">選擇尺碼</label>
          <div id="sizeContainer" class="flex flex-wrap gap-2"></div>
        </div>
        
        <!-- 預計取貨時間（連動試算表公告設定 K 欄） -->
        <div>
          <label class="text-[11px] font-bold text-stone-500 block mb-1.5">『預計取貨時間 』(必填)</label>
          <select id="pickupTimeSelect" class="w-full text-xs p-2.5 border border-border-soft rounded-lg bg-stone-50 text-carbon-black font-medium"></select>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[11px] font-bold text-stone-500 block mb-1">訂購人姓名</label>
            <input type="text" id="custName" class="w-full text-xs p-2 border border-border-soft rounded-lg">
          </div>
          <div>
            <label class="text-[11px] font-bold text-stone-500 block mb-1">手機號碼</label>
            <input type="text" id="custPhone" class="w-full text-xs p-2 border border-border-soft rounded-lg">
          </div>
        </div>
        <div>
          <label class="text-[11px] font-bold text-stone-500 block mb-1">LINE 暱稱</label>
          <input type="text" id="lineName" class="w-full text-xs p-2 border border-border-soft rounded-lg">
        </div>

        <div class="flex justify-between items-center bg-stone-50 p-2.5 rounded-lg border border-border-soft">
          <span class="text-xs text-stone-500">購買數量</span>
          <div class="flex items-center gap-3">
            <button onclick="changeQty(-1)" class="w-7 h-7 bg-white rounded border flex items-center justify-center text-sm font-bold">-</button>
            <span id="orderQty" class="text-xs font-bold w-6 text-center">1</span>
            <button onclick="changeQty(1)" class="w-7 h-7 bg-white rounded border flex items-center justify-center text-sm font-bold">+</button>
          </div>
        </div>
      </div>

      <button onclick="submitOrder()" class="w-full bg-warm-taupe text-white text-xs font-medium py-3 rounded-xl shadow-md hover:bg-taupe-dark">確認送出預約</button>
    </div>
  </div>

  <!-- 地點與營業時間資訊（與店名同色調溫柔碳黑 #3A3530，極緻高階感） -->
  <div class="mx-4 my-6 bg-white/60 border border-border-soft rounded-xl p-4 text-center space-y-1.5 shadow-sm">
    <div class="text-xs font-bold text-carbon-black">📍 伊利小編購 店面資訊</div>
    <div class="text-xs text-carbon-black">營業時間：平日 16:00 - 20:00</div>
    <a href="https://share.google/WVzvnfsiIDpCLF28i" target="_blank" class="inline-block text-xs text-carbon-black underline font-medium hover:opacity-80 transition-opacity">
      地點：八德國小斜對面貨櫃市集 (點擊導航)
    </a>
  </div>

  <!-- 底部 Sibyl 版權聲明 -->
  <div class="w-full text-center py-6 border-t border-border-soft/60 mt-6">
    <a href="https://www.heysibyl.com/" target="_blank" class="text-sibyl-gold text-[10px] tracking-widest font-light hover:opacity-80 transition-opacity">
      Designed by Sibyl | 數位管家
    </a>
  </div>

  <script>
    // ⚠️【核心提醒】請把這裡換成您點擊 Apps Script 部署後產生的 exec 網址！
    let GAS_API_URL = "https://script.google.com/macros/s/AKfycbwkq-c-eE39XF9Vsoke-sBg46NAegrYkVihaEcn8EQF1rC6fTZEw2bzKrCnMXyfkxApdg/exec"; 
    let storeProducts = [];
    let selectedColor = ""; let selectedSize = "";
    let currentActiveProduct = null;

    window.onload = function() {
      callBackend({ method: "getStoreData" }, initStoreUI);
    };

    function callBackend(payload, callback) {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        // 如果在 GAS 內部環境
        if(payload.method === "getStoreData") google.script.run.withSuccessHandler(callback).getStoreData();
        if(payload.method === "searchProducts") google.script.run.withSuccessHandler(callback).searchProducts(payload.keyword);
        if(payload.method === "queryOrder") google.script.run.withSuccessHandler(function(res){ callback({success:true, html:res}) }).queryOrder(payload.phone);
        if(payload.method === "submitNewOrder") google.script.run.withSuccessHandler(callback).submitNewOrder(payload.payload);
      } else {
        // 核心修正：如果是外部（GitHub Pages），自動走安全 POST 跨網域存取
        fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) })
          .then(r => r.json()).then(callback).catch(e => console.error("連線異常:", e));
      }
    }

    function initStoreUI(data) {
      if (!data || !data.success) return;
      const c = data.config;
      document.getElementById('announcementText').innerText = c.announcement;

      const timeSelect = document.getElementById('pickupTimeSelect');
      timeSelect.innerHTML = "";
      c.timeOptions.forEach(opt => {
        let o = document.createElement('option'); o.value = o.text = opt; timeSelect.appendChild(o);
      });

      const slider = document.getElementById('categorySlider');
      slider.innerHTML = `<button onclick="filterCategory('all')" class="bg-warm-taupe text-white text-xs px-4 py-1.5 rounded-full whitespace-nowrap shadow-sm">全部商品</button>`;
      data.majorCategories.forEach(cat => {
        slider.innerHTML += `<button onclick="filterCategory('${cat}')" class="bg-white border border-border-soft text-carbon-black text-xs px-4 py-1.5 rounded-full whitespace-nowrap hover:bg-stone-100">${cat}</button>`;
      });

      storeProducts = data.products || [];
      renderProductGrid(storeProducts);
    }

    function renderProductGrid(prods) {
      const grid = document.getElementById('productGrid'); grid.innerHTML = '';
      const activeProds = prods.filter(p => p.status !== '下架');
      if(activeProds.length === 0) {
        grid.innerHTML = '<div class="col-span-2 text-center py-12 text-xs text-stone-400">目前暫無商品架上項目</div>'; return;
      }
      activeProds.forEach((p, idx) => {
        let finalImg = p.imgUrl ? p.imgUrl : 'https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=400';
        grid.innerHTML += `
          <div onclick="openOrderModal(${idx})" class="bg-white rounded-xl border border-border-soft overflow-hidden shadow-sm flex flex-col cursor-pointer">
            <div class="w-full aspect-square bg-stone-50 relative">
              ${p.tag ? `<span class="absolute top-2 left-2 bg-misty-rose text-white text-[9px] font-bold px-2 py-0.5 rounded shadow-sm">${p.tag}</span>` : ''}
              <img class="w-full h-full object-cover" src="${finalImg}">
            </div>
            <div class="p-3 flex flex-col flex-1 justify-between bg-white">
              <h2 class="text-xs font-medium text-carbon-black line-clamp-2 leading-relaxed h-8">${p.name}</h2>
              <div class="flex items-baseline gap-1.5 mt-2">
                <span class="text-xs font-bold text-warm-taupe">NT$${p.price}</span>
              </div>
            </div>
          </div>
        `;
      });
    }

    function openOrderModal(idx) {
      const p = storeProducts[idx]; currentActiveProduct = p;
      selectedColor = ""; selectedSize = "";
      document.getElementById('orderQty').innerText = "1";
      document.getElementById('modalProdName').innerText = p.name;
      document.getElementById('modalProdPrice').innerText = `NT$ ${p.price}`;

      const colorArea = document.getElementById('colorArea');
      const colorContainer = document.getElementById('colorContainer');
      colorContainer.innerHTML = "";
      if(p.colors && p.colors.length > 0 && p.colors[0] !== "") {
        colorArea.classList.remove('hidden');
        p.colors.forEach(c => {
          colorContainer.innerHTML += `<button onclick="selectColor(this,'${c}')" class="border border-stone-200 text-xs px-3 py-1.5 rounded-lg bg-white">${c}</button>`;
        });
      } else { colorArea.classList.add('hidden'); }

      const sizeArea = document.getElementById('sizeArea');
      const sizeContainer = document.getElementById('sizeContainer');
      sizeContainer.innerHTML = "";
      if(p.sizes && p.sizes.length > 0 && p.sizes[0] !== "") {
        sizeArea.classList.remove('hidden');
        p.sizes.forEach(s => {
          sizeContainer.innerHTML += `<button onclick="selectSize(this,'${s}')" class="border border-stone-200 text-xs px-3 py-1.5 rounded-lg bg-white">${s}</button>`;
        });
      } else { sizeArea.classList.add('hidden'); }

      document.getElementById('orderModal').className = "fixed inset-0 bg-black/40 backdrop-blur-[2px] flex z-50 items-end sm:items-center justify-center p-0";
    }

    function selectColor(btn, val) {
      Array.from(btn.parentElement.children).forEach(b => b.className = "border border-stone-200 text-xs px-3 py-1.5 rounded-lg bg-white");
      btn.className = "border-2 border-warm-taupe text-white text-xs px-3 py-1.5 rounded-lg bg-warm-taupe font-medium";
      selectedColor = val;
    }

    function selectSize(btn, val) {
      Array.from(btn.parentElement.children).forEach(b => b.className = "border border-stone-200 text-xs px-3 py-1.5 rounded-lg bg-white");
      btn.className = "border-2 border-warm-taupe text-white text-xs px-3 py-1.5 rounded-lg bg-warm-taupe font-medium";
      selectedSize = val;
    }

    function changeQty(amt) {
      let q = parseInt(document.getElementById('orderQty').innerText) + amt;
      if (q < 1) q = 1; document.getElementById('orderQty').innerText = q;
    }

    function submitOrder() {
      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const line = document.getElementById('lineName').value.trim();
      const time = document.getElementById('pickupTimeSelect').value;
      const qty = parseInt(document.getElementById('orderQty').innerText);

      if(!name || !phone) { alert("請填寫姓名與電話！"); return; }
      
      const payload = {
        orderId: "EL-" + Math.floor(100000 + Math.random() * 900000),
        lineName: line || "無", custName: name, phone: phone,
        sku: currentActiveProduct.sku, name: currentActiveProduct.name,
        color: selectedColor || "預設款式", size: selectedSize || "均碼",
        qty: qty, price: currentActiveProduct.price, total: currentActiveProduct.price * qty,
        pickupTime: time
      };

      alert("⏳ 正在將預約資料同步儲存至試算表...");
      callBackend({ method: "submitNewOrder", payload: payload }, function(res) {
        alert(res.message); if(res.success) closeOrderModal();
      });
    }

    function closeOrderModal() { document.getElementById('orderModal').classList.add('hidden'); }
    function toggleQueryPanel() { document.getElementById('queryPanel').classList.toggle('hidden'); }
    function fetchOrderProgress() {
      const phone = document.getElementById('orderQueryInput').value;
      if(!phone) return;
      callBackend({ method: "queryOrder", phone: phone }, function(res) {
        document.getElementById('queryResult').innerHTML = res.html;
      });
    }
    function filterCategory(cat) {
      if(cat === 'all') { renderProductGrid(storeProducts); }
      else { renderProductGrid(storeProducts.filter(p => p.major === cat)); }
    }
    function searchProducts() {
      const kw = document.getElementById('searchInput').value;
      callBackend({ method: "searchProducts", keyword: kw }, function(res){ renderProductGrid(res.products); });
    }
  </script>
</body>
</html>
