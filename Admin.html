<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伊利小編購後台 | 智慧雲端管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-main': '#F7F5F0',
            'primary-taupe': '#8C857B',
            'taupe-dark': '#6E675F',
            'text-dark': '#3A3530',
            'border-soft': '#EAE6DF',
            'sibyl-gold': '#bca085'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-main text-text-dark font-sans p-4 sm:p-6">
  <div class="max-w-6xl mx-auto relative">
    
    <div class="flex flex-col sm:flex-row justify-between items-center border-b border-border-soft pb-4 mb-6">
      <div class="text-center sm:text-left">
        <h1 class="text-2xl font-bold tracking-wider text-text-dark">伊利小編購 智慧管理後台</h1>
        <p class="text-xs text-primary-taupe mt-1">2026 行動化公版 (無 JSON 規格防破圖設計)</p>
      </div>
      <a id="viewStoreLink" href="#" target="_blank" class="mt-3 sm:mt-0 bg-primary-taupe text-white text-xs font-medium px-4 py-2.5 rounded-lg shadow-sm hover:bg-taupe-dark transition-all">🌐 前往官方前台行動商城</a>
    </div>

    <div class="flex gap-1 border-b border-border-soft overflow-x-auto mb-6">
      <button onclick="switchTab('uploadTab')" id="btn-uploadTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-primary-taupe text-text-dark bg-white rounded-t-lg">商品快速上架</button>
      <button onclick="switchTab('orderTab')" id="btn-orderTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400 hover:text-text-dark">即時訂單看板</button>
    </div>

    <div id="uploadTab" class="tab-content bg-white border border-border-soft rounded-xl p-5 sm:p-6 shadow-sm space-y-4">
      <h2 class="text-sm font-bold border-b border-border-soft pb-2 text-stone-700">✍️ 上架新商品 (品名、特價為必填)</h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">商品貨號 (選填)</label>
          <input type="text" id="pSku" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50 outline-none" placeholder="例如：A01">
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-semibold text-stone-600 block mb-1">商品品名 <span class="text-red-500">(必填)</span></label>
          <input type="text" id="pName" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50 outline-none" placeholder="例如：韓系休閒口袋寬鬆上衣">
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">商品狀態</label>
          <select id="pStatus" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50">
            <option value="上架">上架</option>
            <option value="下架">下架</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">主分類</label>
          <select id="pMajorSelect" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50"></select>
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">副分類</label>
          <select id="pSubSelect" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50"></select>
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">特色標籤 (選填)</label>
          <input type="text" id="pTag" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="如：熱銷現貨">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">顏色清單 (用英文或中文逗號隔開)</label>
          <input type="text" id="pColors" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：黑色,白色,卡其">
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">尺碼清單 (用英文或中文逗號隔開)</label>
          <input type="text" id="pSizes" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：M,L,均碼">
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">原價 (選填)</label>
          <input type="text" id="pOldPrice" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：590">
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">特價單價 <span class="text-red-500">(必填)</span></label>
          <input type="number" id="pPrice" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：390">
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">加購品名稱 (選填)</label>
          <input type="text" id="pAddonName" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：隨身小鏡子">
        </div>
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">加購品加價 (選填)</label>
          <input type="number" id="pAddonPrice" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50" placeholder="例如：49">
        </div>
      </div>

      <div>
        <label class="text-xs font-semibold text-stone-600 block mb-1">圖片網址欄位 (支援多張圖片空格格開)</label>
        <textarea id="pImgs" rows="3" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50 outline-none" placeholder="輸入圖片網址..."></textarea>
      </div>

      <div>
        <label class="text-xs font-semibold text-stone-600 block mb-1">商品敘述</label>
        <textarea id="pDesc" rows="2" class="w-full text-sm p-2.5 border border-border-soft rounded-lg bg-stone-50 outline-none" placeholder="描述細節..."></textarea>
      </div>

      <button onclick="publishProduct()" class="w-full bg-primary-taupe text-white font-medium text-sm py-3 rounded-lg hover:bg-taupe-dark transition-all">一鍵即時同步商品網頁上架</button>
    </div>

    <div id="orderTab" class="tab-content bg-white border border-border-soft rounded-xl p-5 shadow-sm space-y-4 hidden">
      <div class="flex justify-between items-center flex-wrap gap-2">
        <h2 class="text-sm font-bold text-stone-700">📋 即時預約取貨訂單看板</h2>
        <button onclick="loadAllOrders()" class="bg-stone-100 hover:bg-stone-200 text-stone-700 text-xs px-3 py-1.5 rounded-md border border-stone-300 transition-all">🔄 刷新最新訂單</button>
      </div>
      <div class="overflow-x-auto border border-border-soft rounded-lg">
        <table class="w-full text-left text-xs border-collapse">
          <thead>
            <tr class="bg-stone-50 text-stone-600 border-b border-border-soft">
              <th class="p-3">下單時間</th>
              <th class="p-3">訂單編號</th>
              <th class="p-3">訂購客戶</th>
              <th class="p-3">品名規格</th>
              <th class="p-3">數量金額</th>
              <th class="p-3">⏱️ 預計取貨時間</th>
              <th class="p-3">狀態</th>
            </tr>
          </thead>
          <tbody id="orderTableBody" class="divide-y divide-border-soft text-stone-700">
            <tr><td colspan="7" class="text-center p-6 text-stone-400">請刷新訂單資料。</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="w-full text-center py-8 border-t border-border-soft/60 mt-12">
      <a href="https://www.heysibyl.com/" target="_blank" class="text-sibyl-gold text-[10px] tracking-widest font-light hover:opacity-80 transition-opacity">
        Designed by Sibyl | 數位管家
      </a>
    </div>

  </div>

  <script>
    window.onload = function() {
      if (typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function(data) {
          if (!data || !data.success) {
            alert("❌ 連線錯誤：請檢查試算表 ID 與共用檢視權限！"); return;
          }
          const majEl = document.getElementById('pMajorSelect');
          const subEl = document.getElementById('pSubSelect');
          majEl.innerHTML = ""; subEl.innerHTML = "";
          data.majorCategories.forEach(c => { let o = document.createElement('option'); o.value=o.text=c; majEl.appendChild(o); });
          data.subCategories.forEach(c => { let o = document.createElement('option'); o.value=o.text=c; subEl.appendChild(o); });
        }).getStoreData();
      }
    };

    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.className = "px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400 hover:text-text-dark";
      });
      document.getElementById(id).classList.remove('hidden');
      document.getElementById('btn-' + id).className = "px-5 py-3 text-sm font-medium border-b-2 border-primary-taupe text-text-dark bg-white rounded-t-lg";
      if(id === 'orderTab') { loadAllOrders(); }
    }

    function publishProduct() {
      const name = document.getElementById('pName').value.trim();
      const price = document.getElementById('pPrice').value;
      if(!name || !price) { alert("品名與特價單價為必填欄位！"); return; }

      const pObj = {
        sku: document.getElementById('pSku').value.trim() || ("SKU-" + Date.now().toString().slice(-4)),
        name: name, status: document.getElementById('pStatus').value,
        major: document.getElementById('pMajorSelect').value, sub: document.getElementById('pSubSelect').value,
        tag: document.getElementById('pTag').value.trim(), desc: document.getElementById('pDesc').value.trim(),
        video: "", imgs: document.getElementById('pImgs').value.trim(), oldPrice: document.getElementById('pOldPrice').value,
        price: Number(price), color: document.getElementById('pColors').value.trim(), size: document.getElementById('pSizes').value.trim(),
        addonName: document.getElementById('pAddonName').value.trim(), addonPrice: Number(document.getElementById('pAddonPrice').value || 0)
      };

      google.script.run.withSuccessHandler(function(res) {
        alert(res.message);
        if(res.success) {
          document.getElementById('pName').value = ""; document.getElementById('pPrice').value = "";
        }
      }).addNewProduct(pObj);
    }

    function loadAllOrders() {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = "<tr><td colspan='7' class='text-center p-4 text-stone-400 animate-pulse'>資料同步讀取中...</td></tr>";
      google.script.run.withSuccessHandler(function(res) {
        if(!res.success || res.orders.length === 0) {
          tbody.innerHTML = "<tr><td colspan='7' class='text-center p-4 text-stone-400'>目前無任何訂單紀錄。</td></tr>"; return;
        }
        tbody.innerHTML = "";
        res.orders.forEach(o => {
          tbody.innerHTML += `
            <tr class="hover:bg-stone-50">
              <td class="p-3 font-mono text-[11px] text-stone-500">${o.time}</td>
              <td class="p-3 font-bold">${o.orderId}</td>
              <td class="p-3"><b>${o.custName}</b><br><span class="text-stone-400">${o.phone}</span></td>
              <td class="p-3">${o.prodName}<br><span class="text-primary-taupe text-[11px]">${o.color} / ${o.size}</span></td>
              <td class="p-3"><b>${o.qty} 件</b><br><span class="text-stone-500 font-semibold">$${o.total}</span></td>
              <td class="p-3"><span class="bg-amber-50 text-amber-800 border border-amber-200 px-2 py-1 rounded text-[11px] font-medium">${o.pickupTime}</span></td>
              <td class="p-3"><span class="px-2 py-0.5 bg-green-100 text-green-800 rounded-full text-[10px] font-bold">${o.status}</span></td>
            </tr>
          `;
        });
      }).getAllOrders();
    }
  </script>
</body>
</html>
